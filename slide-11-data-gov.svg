<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="'Segoe UI','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="shadow" x="-3%" y="-3%" width="106%" height="112%">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect width="900" height="500" rx="12" fill="#f8fafc"/>
  <text x="450" y="42" text-anchor="middle" font-size="24" font-weight="700" fill="#1e293b">数据治理 · 卡数据副本追踪</text>
  <line x1="310" y1="56" x2="590" y2="56" stroke="#0d9488" stroke-width="3" stroke-linecap="round"/>

  <!-- Central data source -->
  <rect x="350" y="85" width="200" height="60" rx="12" fill="#1a73e8"/>
  <text x="450" y="112" text-anchor="middle" font-size="14" font-weight="700" fill="white">💳 CDE 卡数据</text>
  <text x="450" y="130" text-anchor="middle" font-size="11" fill="rgba(255,255,255,0.85)">唯一合法存储点</text>

  <!-- Data copies radiating out -->
  <!-- Log -->
  <path d="M350,130 L180,180" stroke="#ef4444" stroke-width="2" stroke-dasharray="6,3"/>
  <rect x="60" y="170" width="200" height="70" rx="10" fill="white" stroke="#fca5a5" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="160" y="195" text-anchor="middle" font-size="13" font-weight="600" fill="#dc2626">📝 ELK / 日志</text>
  <text x="160" y="215" text-anchor="middle" font-size="11" fill="#b91c1c">错误日志打了完整 PAN</text>
  <text x="160" y="230" text-anchor="middle" font-size="10" fill="#64748b">→ 整个集群进 CDE</text>

  <!-- APM -->
  <path d="M450,145 L450,185" stroke="#ef4444" stroke-width="2" stroke-dasharray="6,3"/>
  <rect x="350" y="185" width="200" height="70" rx="10" fill="white" stroke="#fca5a5" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="450" y="210" text-anchor="middle" font-size="13" font-weight="600" fill="#dc2626">📊 APM / Trace</text>
  <text x="450" y="230" text-anchor="middle" font-size="11" fill="#b91c1c">采了请求体含卡号</text>
  <text x="450" y="245" text-anchor="middle" font-size="10" fill="#64748b">→ APM 进 CDE</text>

  <!-- Customer Service -->
  <path d="M550,130 L720,180" stroke="#ef4444" stroke-width="2" stroke-dasharray="6,3"/>
  <rect x="640" y="170" width="200" height="70" rx="10" fill="white" stroke="#fca5a5" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="740" y="195" text-anchor="middle" font-size="13" font-weight="600" fill="#dc2626">🎧 客服后台</text>
  <text x="740" y="215" text-anchor="middle" font-size="11" fill="#b91c1c">截图里有卡号</text>
  <text x="740" y="230" text-anchor="middle" font-size="10" fill="#64748b">→ 客服系统进 CDE</text>

  <!-- BI -->
  <path d="M380,130 L180,290" stroke="#f59e0b" stroke-width="2" stroke-dasharray="6,3"/>
  <rect x="60" y="280" width="200" height="70" rx="10" fill="white" stroke="#fde68a" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="160" y="305" text-anchor="middle" font-size="13" font-weight="600" fill="#d97706">📈 BI / 数仓</text>
  <text x="160" y="325" text-anchor="middle" font-size="11" fill="#92400e">同步了未脱敏数据</text>
  <text x="160" y="340" text-anchor="middle" font-size="10" fill="#64748b">PAN → token/hash，CVV 不进</text>

  <!-- Test env -->
  <path d="M520,130 L720,290" stroke="#f59e0b" stroke-width="2" stroke-dasharray="6,3"/>
  <rect x="640" y="280" width="200" height="70" rx="10" fill="white" stroke="#fde68a" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="740" y="305" text-anchor="middle" font-size="13" font-weight="600" fill="#d97706">🧪 测试环境</text>
  <text x="740" y="325" text-anchor="middle" font-size="11" fill="#92400e">用了真实卡号测试</text>
  <text x="740" y="340" text-anchor="middle" font-size="10" fill="#64748b">→ 一票否决</text>

  <!-- Bottom: Data governance rules -->
  <rect x="30" y="380" width="840" height="105" rx="14" fill="white" stroke="#d1fae5" stroke-width="2" filter="url(#shadow)"/>
  <rect x="30" y="380" width="840" height="38" rx="14" fill="#059669"/>
  <rect x="30" y="405" width="840" height="13" fill="#059669"/>
  <text x="450" y="405" text-anchor="middle" font-size="14" font-weight="700" fill="white">治理规则 · v4.0 要求</text>

  <text x="55" y="438" font-size="12" fill="#334155">
    <tspan font-weight="700" fill="#059669">日志：</tspan>全链路不记录 PAN/CVV，正则脱敏，权限+留存周期
  </text>
  <text x="55" y="458" font-size="12" fill="#334155">
    <tspan font-weight="700" fill="#059669">客服：</tspan>只展示后四位+卡品牌，全量审计，权限拆分
  </text>
  <text x="55" y="478" font-size="12" fill="#334155">
    <tspan font-weight="700" fill="#059669">BI：</tspan>PAN→token/hash，CVV 不进，BIN 可进
    <tspan font-weight="700" fill="#059669" dx="20">AI 风控：</tspan>用 BIN/token/PSP 风控分/合成数据
  </text>
</svg>