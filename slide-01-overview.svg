<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 400" font-family="'Segoe UI','Microsoft YaHei',sans-serif">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1a73e8;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#4285f4;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0d9488;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#14b8a6;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="g3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#fbbf24;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="g4" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ef4444;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#f87171;stop-opacity:1"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.15"/>
    </filter>
  </defs>
  <rect width="900" height="400" rx="12" fill="#f8fafc"/>
  <text x="450" y="50" text-anchor="middle" font-size="26" font-weight="700" fill="#1e293b">PCI DSS 培训 · 四大模块</text>
  <line x1="300" y1="65" x2="600" y2="65" stroke="#1a73e8" stroke-width="3" stroke-linecap="round"/>

  <!-- Module 1 -->
  <rect x="30" y="110" width="190" height="220" rx="16" fill="url(#g1)" filter="url(#shadow)"/>
  <text x="125" y="160" text-anchor="middle" font-size="42" fill="white">📋</text>
  <text x="125" y="200" text-anchor="middle" font-size="18" font-weight="700" fill="white">模块一</text>
  <text x="125" y="228" text-anchor="middle" font-size="15" font-weight="600" fill="rgba(255,255,255,0.95)">合规判断</text>
  <line x1="70" y1="245" x2="180" y2="245" stroke="rgba(255,255,255,0.4)" stroke-width="1"/>
  <text x="125" y="270" text-anchor="middle" font-size="12" fill="rgba(255,255,255,0.85)">等级 · SAQ · Scope</text>
  <text x="125" y="295" text-anchor="middle" font-size="11" fill="rgba(255,255,255,0.7)">我们在 Scope 里吗？</text>

  <!-- Arrow 1→2 -->
  <path d="M230,220 L250,220" stroke="#94a3b8" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <defs><marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#94a3b8"/></marker></defs>

  <!-- Module 2 -->
  <rect x="255" y="110" width="190" height="220" rx="16" fill="url(#g2)" filter="url(#shadow)"/>
  <text x="350" y="160" text-anchor="middle" font-size="42" fill="white">🛒</text>
  <text x="350" y="200" text-anchor="middle" font-size="18" font-weight="700" fill="white">模块二</text>
  <text x="350" y="228" text-anchor="middle" font-size="15" font-weight="600" fill="rgba(255,255,255,0.95)">产品落地</text>
  <line x1="295" y1="245" x2="405" y2="245" stroke="rgba(255,255,255,0.4)" stroke-width="1"/>
  <text x="350" y="270" text-anchor="middle" font-size="12" fill="rgba(255,255,255,0.85)">接入 · CIT/MIT · Token</text>
  <text x="350" y="295" text-anchor="middle" font-size="11" fill="rgba(255,255,255,0.7)">选型压最小 PCI 成本？</text>

  <!-- Arrow 2→3 -->
  <path d="M455,220 L475,220" stroke="#94a3b8" stroke-width="2" fill="none"/>

  <!-- Module 3 -->
  <rect x="480" y="110" width="190" height="220" rx="16" fill="url(#g3)" filter="url(#shadow)"/>
  <text x="575" y="160" text-anchor="middle" font-size="42" fill="white">🏗️</text>
  <text x="575" y="200" text-anchor="middle" font-size="18" font-weight="700" fill="white">模块三</text>
  <text x="575" y="228" text-anchor="middle" font-size="15" font-weight="600" fill="rgba(255,255,255,0.95)">技术架构</text>
  <line x1="520" y1="245" x2="630" y2="245" stroke="rgba(255,255,255,0.4)" stroke-width="1"/>
  <text x="575" y="270" text-anchor="middle" font-size="12" fill="rgba(255,255,255,0.85)">Vault · 密钥 · 前端 · 日志</text>
  <text x="575" y="295" text-anchor="middle" font-size="11" fill="rgba(255,255,255,0.7)">怎么落地？</text>

  <!-- Arrow 3→4 -->
  <path d="M680,220 L700,220" stroke="#94a3b8" stroke-width="2" fill="none"/>

  <!-- Module 4 -->
  <rect x="705" y="110" width="165" height="220" rx="16" fill="url(#g4)" filter="url(#shadow)"/>
  <text x="787" y="160" text-anchor="middle" font-size="42" fill="white">🔍</text>
  <text x="787" y="200" text-anchor="middle" font-size="18" font-weight="700" fill="white">模块四</text>
  <text x="787" y="228" text-anchor="middle" font-size="15" font-weight="600" fill="rgba(255,255,255,0.95)">运营审计</text>
  <line x1="735" y1="245" x2="840" y2="245" stroke="rgba(255,255,255,0.4)" stroke-width="1"/>
  <text x="787" y="270" text-anchor="middle" font-size="12" fill="rgba(255,255,255,0.85)">客服 · 测试 · 权限 · 响应</text>
  <text x="787" y="295" text-anchor="middle" font-size="11" fill="rgba(255,255,255,0.7)">怎么兜底？</text>

  <!-- Bottom flow -->
  <rect x="150" y="360" width="600" height="28" rx="14" fill="#e2e8f0"/>
  <text x="450" y="379" text-anchor="middle" font-size="13" fill="#475569">要求是什么  →  怎么设计降成本  →  怎么落地  →  怎么证明做到了</text>
</svg>