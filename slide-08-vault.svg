<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 480" font-family="'Segoe UI','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="shadow" x="-3%" y="-3%" width="106%" height="112%">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect width="900" height="480" rx="12" fill="#f8fafc"/>
  <text x="450" y="42" text-anchor="middle" font-size="24" font-weight="700" fill="#1e293b">Card Vault 选型</text>
  <line x1="350" y1="56" x2="550" y2="56" stroke="#f59e0b" stroke-width="3" stroke-linecap="round"/>

  <!-- Option 1: PSP Vault -->
  <rect x="30" y="80" width="265" height="200" rx="14" fill="white" stroke="#d1fae5" stroke-width="2" filter="url(#shadow)"/>
  <rect x="30" y="80" width="265" height="44" rx="14" fill="#ecfdf5"/>
  <rect x="30" y="110" width="265" height="14" fill="#ecfdf5"/>
  <text x="162" y="108" text-anchor="middle" font-size="15" font-weight="700" fill="#059669">方案一：PSP Vault</text>

  <!-- Simple diagram -->
  <rect x="55" y="140" width="80" height="40" rx="6" fill="#059669" opacity="0.15" stroke="#059669" stroke-width="1"/>
  <text x="95" y="165" text-anchor="middle" font-size="11" fill="#059669">商户</text>
  <text x="150" y="165" text-anchor="middle" font-size="16" fill="#94a3b8">→</text>
  <rect x="170" y="140" width="100" height="40" rx="6" fill="#059669"/>
  <text x="220" y="165" text-anchor="middle" font-size="11" fill="white">PSP Vault</text>

  <text x="162" y="200" text-anchor="middle" font-size="13" font-weight="600" fill="#059669">成本最低</text>
  <text x="162" y="220" text-anchor="middle" font-size="12" fill="#334155">跨 PSP：❌</text>
  <text x="162" y="240" text-anchor="middle" font-size="12" fill="#334155">锁定单 PSP</text>
  <text x="162" y="265" text-anchor="middle" font-size="11" fill="#64748b">✅ 适合：单 PSP 场景</text>

  <!-- Option 2: Third-party Vault -->
  <rect x="318" y="80" width="265" height="200" rx="14" fill="white" stroke="#fde68a" stroke-width="2" filter="url(#shadow)"/>
  <rect x="318" y="80" width="265" height="44" rx="14" fill="#fffbeb"/>
  <rect x="318" y="110" width="265" height="14" fill="#fffbeb"/>
  <text x="450" y="108" text-anchor="middle" font-size="15" font-weight="700" fill="#d97706">方案二：第三方 Vault</text>

  <!-- Diagram -->
  <rect x="340" y="140" width="70" height="40" rx="6" fill="#d97706" opacity="0.15" stroke="#d97706" stroke-width="1"/>
  <text x="375" y="165" text-anchor="middle" font-size="11" fill="#d97706">商户</text>
  <text x="425" y="155" text-anchor="middle" font-size="14" fill="#94a3b8">→</text>
  <rect x="440" y="135" width="90" height="50" rx="6" fill="#d97706"/>
  <text x="485" y="155" text-anchor="middle" font-size="10" fill="white">第三方</text>
  <text x="485" y="170" text-anchor="middle" font-size="10" fill="white">Vault</text>
  <text x="545" y="150" text-anchor="middle" font-size="14" fill="#94a3b8">→</text>
  <text x="580" y="145" font-size="10" fill="#64748b">PSP A</text>
  <text x="580" y="160" font-size="10" fill="#64748b">PSP B</text>
  <text x="580" y="175" font-size="10" fill="#64748b">PSP C</text>

  <text x="450" y="200" text-anchor="middle" font-size="13" font-weight="600" fill="#d97706">成本中等</text>
  <text x="450" y="220" text-anchor="middle" font-size="12" fill="#334155">跨 PSP：✅</text>
  <text x="450" y="240" text-anchor="middle" font-size="12" fill="#334155">Spreedly / VGS / Basis Theory</text>
  <text x="450" y="265" text-anchor="middle" font-size="11" fill="#64748b">✅ 适合：多 PSP，不自建</text>

  <!-- Option 3: Self-built Vault -->
  <rect x="605" y="80" width="265" height="200" rx="14" fill="white" stroke="#fecaca" stroke-width="2" filter="url(#shadow)"/>
  <rect x="605" y="80" width="265" height="44" rx="14" fill="#fef2f2"/>
  <rect x="605" y="110" width="265" height="14" fill="#fef2f2"/>
  <text x="737" y="108" text-anchor="middle" font-size="15" font-weight="700" fill="#dc2626">方案三：自建 Vault</text>

  <!-- Complex diagram -->
  <rect x="625" y="135" width="70" height="40" rx="6" fill="#dc2626" opacity="0.15" stroke="#dc2626" stroke-width="1"/>
  <text x="660" y="160" text-anchor="middle" font-size="11" fill="#dc2626">商户</text>
  <text x="710" y="155" text-anchor="middle" font-size="14" fill="#94a3b8">→</text>
  <rect x="720" y="130" width="100" height="50" rx="6" fill="#dc2626"/>
  <text x="770" y="150" text-anchor="middle" font-size="10" fill="white">自建 Vault</text>
  <text x="770" y="165" text-anchor="middle" font-size="9" fill="rgba(255,255,255,0.8)">+ HSM</text>
  <text x="835" y="145" font-size="10" fill="#64748b">PSP A</text>
  <text x="835" y="160" font-size="10" fill="#64748b">PSP B</text>
  <text x="835" y="175" font-size="10" fill="#64748b">PSP C</text>

  <text x="737" y="200" text-anchor="middle" font-size="13" font-weight="600" fill="#dc2626">成本最高</text>
  <text x="737" y="220" text-anchor="middle" font-size="12" fill="#334155">跨 PSP：✅ + 完全控制</text>
  <text x="737" y="240" text-anchor="middle" font-size="12" fill="#334155">HSM/KMS/双人控制/渗透</text>
  <text x="737" y="265" text-anchor="middle" font-size="11" fill="#64748b">✅ 适合：大体量 + 强控制权</text>

  <!-- Vault orchestration value -->
  <rect x="30" y="305" width="840" height="155" rx="14" fill="white" stroke="#e2e8f0" stroke-width="1" filter="url(#shadow)"/>
  <text x="60" y="335" font-size="16" font-weight="700" fill="#1e293b">多 PSP 场景下独立 Vault 的价值 — "编排"</text>

  <rect x="55" y="355" width="180" height="85" rx="10" fill="#eff6ff" stroke="#93c5fd" stroke-width="1"/>
  <text x="145" y="380" text-anchor="middle" font-size="13" font-weight="600" fill="#1d4ed8">💰 成本路由</text>
  <text x="145" y="400" text-anchor="middle" font-size="11" fill="#1e40af">哪家费率低走哪家</text>
  <text x="145" y="420" text-anchor="middle" font-size="11" fill="#1e40af">BIN 级别智能分发</text>

  <rect x="260" y="355" width="180" height="85" rx="10" fill="#f0fdf4" stroke="#86efac" stroke-width="1"/>
  <text x="350" y="380" text-anchor="middle" font-size="13" font-weight="600" fill="#059669">📈 授权率路由</text>
  <text x="350" y="400" text-anchor="middle" font-size="11" fill="#047857">哪家某地区授权率高</text>
  <text x="350" y="420" text-anchor="middle" font-size="11" fill="#047857">卡类型级别优化</text>

  <rect x="465" y="355" width="180" height="85" rx="10" fill="#fef2f2" stroke="#fca5a5" stroke-width="1"/>
  <text x="555" y="380" text-anchor="middle" font-size="13" font-weight="600" fill="#dc2626">🔄 容灾切换</text>
  <text x="555" y="400" text-anchor="middle" font-size="11" fill="#b91c1c">PSP A 挂了切 B</text>
  <text x="555" y="420" text-anchor="middle" font-size="11" fill="#b91c1c">秒级故障转移</text>

  <rect x="670" y="355" width="180" height="85" rx="10" fill="#fffbeb" stroke="#fde68a" stroke-width="1"/>
  <text x="760" y="380" text-anchor="middle" font-size="13" font-weight="600" fill="#d97706">🃏 卡类型路由</text>
  <text x="760" y="400" text-anchor="middle" font-size="11" fill="#92400e">Visa → PSP A</text>
  <text x="760" y="420" text-anchor="middle" font-size="11" fill="#92400e">UnionPay → PSP B</text>
</svg>