<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 480" font-family="'Segoe UI','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="shadow" x="-3%" y="-3%" width="106%" height="112%">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-opacity="0.12"/>
    </filter>
    <linearGradient id="spec" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#059669"/>
      <stop offset="50%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#ef4444"/>
    </linearGradient>
  </defs>
  <rect width="900" height="480" rx="12" fill="#f8fafc"/>
  <text x="450" y="42" text-anchor="middle" font-size="24" font-weight="700" fill="#1e293b">支付产品形态与 PCI 影响</text>
  <line x1="310" y1="56" x2="590" y2="56" stroke="#0d9488" stroke-width="3" stroke-linecap="round"/>

  <!-- Spectrum bar -->
  <rect x="50" y="80" width="800" height="18" rx="9" fill="url(#spec)" opacity="0.2"/>
  <rect x="50" y="80" width="200" height="18" rx="9" fill="#059669" opacity="0.7"/>
  <rect x="250" y="80" width="200" height="18" rx="9" fill="#14b8a6" opacity="0.7"/>
  <rect x="450" y="80" width="200" height="18" rx="9" fill="#f59e0b" opacity="0.7"/>
  <rect x="650" y="80" width="200" height="18" rx="9" fill="#ef4444" opacity="0.7"/>
  <text x="150" y="94" text-anchor="middle" font-size="11" font-weight="600" fill="white">最小 Scope</text>
  <text x="750" y="94" text-anchor="middle" font-size="11" font-weight="600" fill="white">最大 Scope</text>

  <!-- Product cards -->
  <!-- Hosted Page -->
  <rect x="30" y="120" width="255" height="160" rx="12" fill="white" stroke="#d1fae5" stroke-width="2" filter="url(#shadow)"/>
  <rect x="30" y="120" width="255" height="36" rx="12" fill="#ecfdf5"/>
  <rect x="30" y="145" width="255" height="11" fill="#ecfdf5"/>
  <text x="157" y="145" text-anchor="middle" font-size="14" font-weight="700" fill="#059669">🟢 Hosted Payment Page</text>
  <text x="50" y="178" font-size="12" fill="#334155">SAQ: <tspan font-weight="700" fill="#059669">A</tspan>（最小）</text>
  <text x="50" y="198" font-size="12" fill="#334155">跳转到 PSP 页面</text>
  <text x="50" y="218" font-size="12" fill="#334155">商户完全不碰卡数据</text>
  <text x="50" y="245" font-size="11" fill="#64748b">⚠ 缺点：跳转伤转化率</text>
  <text x="50" y="265" font-size="11" fill="#64748b">✅ 适合：快速上线、低合规预算</text>

  <!-- Embedded / Elements -->
  <rect x="305" y="120" width="275" height="160" rx="12" fill="white" stroke="#99f6e4" stroke-width="2" filter="url(#shadow)"/>
  <rect x="305" y="120" width="275" height="36" rx="12" fill="#f0fdfa"/>
  <rect x="305" y="145" width="275" height="11" fill="#f0fdfa"/>
  <text x="442" y="145" text-anchor="middle" font-size="14" font-weight="700" fill="#0d9488">🟡 Embedded / Elements</text>
  <text x="325" y="178" font-size="12" fill="#334155">SAQ: <tspan font-weight="700" fill="#0d9488">A-EP</tspan>（甜点区）</text>
  <text x="325" y="198" font-size="12" fill="#334155">iframe 嵌入，前端担责</text>
  <text x="325" y="218" font-size="12" fill="#334155">后端只拿 token，体验好</text>
  <text x="325" y="245" font-size="11" fill="#64748b">⚠ 需管 CSP / SRI / 脚本白名单</text>
  <text x="325" y="265" font-size="11" fill="#64748b">✅ 适合：大多数商户的最佳选择</text>

  <!-- Direct API -->
  <rect x="600" y="120" width="270" height="160" rx="12" fill="white" stroke="#fecaca" stroke-width="2" filter="url(#shadow)"/>
  <rect x="600" y="120" width="270" height="36" rx="12" fill="#fef2f2"/>
  <rect x="600" y="145" width="270" height="11" fill="#fef2f2"/>
  <text x="735" y="145" text-anchor="middle" font-size="14" font-weight="700" fill="#dc2626">🔴 Direct API</text>
  <text x="620" y="178" font-size="12" fill="#334155">SAQ: <tspan font-weight="700" fill="#dc2626">D</tspan>（最大，300+ 问题）</text>
  <text x="620" y="198" font-size="12" fill="#334155">卡数据直接过你的服务器</text>
  <text x="620" y="218" font-size="12" fill="#334155">全量 PCI 合规</text>
  <text x="620" y="245" font-size="11" fill="#64748b">⚠ 合规成本最高</text>
  <text x="620" y="265" font-size="11" fill="#64748b">✅ 适合：自建风控/多 PSP/Vault</text>

  <!-- Bottom row: PayFac + Click to Pay -->
  <rect x="30" y="310" width="420" height="145" rx="12" fill="white" stroke="#e9d5ff" stroke-width="2" filter="url(#shadow)"/>
  <rect x="30" y="310" width="420" height="36" rx="12" fill="#f5f3ff"/>
  <rect x="30" y="335" width="420" height="11" fill="#f5f3ff"/>
  <text x="240" y="335" text-anchor="middle" font-size="14" font-weight="700" fill="#7c3aed">🟣 PayFac 模式</text>
  <text x="50" y="368" font-size="12" fill="#334155">平台做 Master Merchant</text>
  <text x="50" y="388" font-size="12" fill="#334155">子商户快速 onboarding，不用单独收单</text>
  <text x="50" y="415" font-size="11" fill="#64748b">⚠ 平台扛 PCI Level 1，Scope 会膨胀</text>
  <text x="50" y="435" font-size="11" fill="#64748b">✅ 适合：平台型商户规模化覆盖</text>

  <rect x="470" y="310" width="400" height="145" rx="12" fill="white" stroke="#a5f3fc" stroke-width="2" filter="url(#shadow)"/>
  <rect x="470" y="310" width="400" height="36" rx="12" fill="#ecfeff"/>
  <rect x="470" y="335" width="400" height="11" fill="#ecfeff"/>
  <text x="670" y="335" text-anchor="middle" font-size="14" font-weight="700" fill="#0891b2">⚪ Click to Pay / Passkey</text>
  <text x="490" y="368" font-size="12" fill="#334155">卡数据在卡组织/用户设备</text>
  <text x="490" y="388" font-size="12" fill="#334155">商户连碰都碰不到，Scope ≈ 0</text>
  <text x="490" y="415" font-size="11" fill="#64748b">✅ 体验和合规双赢</text>
  <text x="490" y="435" font-size="11" fill="#64748b">✅ 适合：未来趋势，FIDO2 基础设施</text>
</svg>